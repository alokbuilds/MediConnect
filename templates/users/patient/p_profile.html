{% extends "users/patient/p_base.html" %}
{% block title %}Profile Settings{% endblock %}

{% block content %}
<div class="container mt-4">

    <h4 class="fw-bold mb-3">Profile Settings</h4>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST" action="{% url 'update_patient_profile' %}">
                {% csrf_token %}

                <!-- BASIC USER INFO -->
                <h6 class="text-primary mb-3">Basic Information</h6>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name"
                               value="{{ request.user.first_name }}"
                               class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name"
                               value="{{ request.user.last_name }}"
                               class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email"
                           value="{{ request.user.email }}"
                           class="form-control"  value="Inactive" readonly>
                </div>

                <!-- PATIENT DETAILS -->
                <h6 class="text-primary mb-3">Patient Details</h6>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone"
                               value="{{ patient.phone }}"
                               class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select name="gender" class="form-select">
                            <option value="">-- Select --</option>
                            <option value="male" {% if patient.gender == "male" %}selected{% endif %}>Male</option>
                            <option value="female" {% if patient.gender == "female" %}selected{% endif %}>Female</option>
                            <option value="other" {% if patient.gender == "other" %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Age</label>
                        <input type="number" name="age"
                               value="{{ patient.age }}"
                               class="form-control" min="0">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address" rows="3"
                              class="form-control">{{ patient.address }}</textarea>
                </div>

                <!-- SUBMIT -->
                <div class="text-end">
                    <button type="submit" class="btn btn-primary">
                        Update Profile
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>
{% endblock %}
