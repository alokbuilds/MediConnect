{% extends "base/base.html" %}
{% load static %}

{% block title %}403 - Patient Access Denied{% endblock %}

{% block content %}
<div style="text-align:center; padding:60px 20px;">
    <img src="{% static 'images/403.png' %}" alt="403" style="max-width:280px;">

    <h1>Access Denied</h1>
    <p>
        This page is not allowed for <strong>Patient</strong> users.
    </p>

    <div style="margin-top:25px;">
        <a href="{% url 'patient_dashboard' %}" class="btn btn-primary">
            Go to Patient Dashboard
        </a>
    </div>
</div>
{% endblock %}
