{% if messages %}
<div class="messages-container">
    {% for message in messages %}
        <div class="alert 
            {% if message.tags == 'success' %}alert-success
            {% elif message.tags == 'error' %}alert-danger
            {% elif message.tags == 'warning' %}alert-warning
            {% else %}alert-info
            {% endif %}">
            
            {{ message }}

        </div>
    {% endfor %}
</div>
{% endif %}
